<app-mensaje></app-mensaje>

<header>
  <div class="logo-container">
    <h1>PetShop Online USS</h1>
  </div>
  <nav>
    <app-menu></app-menu>
  </nav>
</header>

<main class="main-layout">
  <section class="catalog-section">
    <h2>Catálogo de Productos</h2>
    
    <div class="filter-container">
      <label for="categoria-filter">Filtrar por categoría:</label>
      <select 
        id="categoria-filter" 
        class="categoria-select"
        [value]="categoriaSeleccionada() || ''"
        (change)="onCategoriaChange($event)"
      >
        <option value="">Todos</option>
        @for (cat of categorias(); track cat.idCategoria) {
          <option [value]="cat.idCategoria">{{ cat.nombreCategoria }}</option>
        }
      </select>
    </div>

    <div class="products-grid">
      <app-producto #productoComponent></app-producto>
    </div>

    <!-- Formulario de contacto (RF05) -->
    <app-contacto></app-contacto>
  </section>

  <aside class="promotions-sidebar">
    <h3>Promociones Destacadas</h3>
    <div class="promo-box">
      <p>Promocion aleatoria</p>
    </div>
  </aside>
</main>

<footer>
  <p>Contacto: soporte@petshoponline.cl | © 2026 Universidad San Sebastián (USS)</p>
</footer>
